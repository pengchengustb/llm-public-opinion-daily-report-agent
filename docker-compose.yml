services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    environment:
      DATABASE_URL: sqlite:////app/data/opinion_monitor.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    command: streamlit run dashboard/Home.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env.example
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./reports:/app/reports:ro
