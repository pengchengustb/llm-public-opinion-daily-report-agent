services:
  backend:
    build: .
    command: python -m app api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: sqlite:///./data/generated/opinion_monitor.db
      LLM_MOCK_MODE: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data/generated:/app/data/generated
      - ./reports:/app/reports

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env.example
    environment:
      DASHBOARD_BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

